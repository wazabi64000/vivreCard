opencollection: 1.0.0

info:
  name: vivreCard
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
  scripts:
    - type: after-response
      code: |-
        const token = res.getBody().token

        bru.setVar("token", token)
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
